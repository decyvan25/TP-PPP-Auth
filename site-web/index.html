<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requin qui tourne (JS)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Voici un requin qui tourne !</h1>
        <div id="shark-container">
            <!-- Le requin est dessiné ici en SVG -->
            <svg id="shark-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M95,50 C90,60 70,75 50,75 C30,75 10,60 5,50 C10,40 30,25 50,25 C70,25 90,40 95,50 Z" fill="#4a90e2"/>
                <path d="M50,25 C45,15 35,5 25,5 C35,15 45,20 50,25 Z" fill="#357abd"/>
                <circle cx="25" cy="50" r="3" fill="white"/>
                <circle cx="25" cy="50" r="1" fill="black"/>
            </svg>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
